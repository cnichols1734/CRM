<div id="welcomeOverlay" class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-slate-950/60" id="welcomeBackdrop"></div>

    <div class="relative z-10 mx-4 w-full max-w-xl" id="welcomeCard">
        <div class="crm-surface">

            <div class="border-b border-slate-200 px-8 pb-5 pt-7">
                <div class="crm-section-kicker">Origen CRM</div>
                <h2 class="mt-2 text-2xl font-semibold tracking-tight text-slate-950">
                    Welcome, {{ current_user.first_name }}.
                </h2>
            </div>

            <div class="px-8 py-6">
                <p class="text-base text-slate-500 leading-relaxed">
                    Your workspace is set up. Add your clients and the dashboard will fill in on its own.
                </p>
                <p class="mt-4 text-base font-medium text-slate-900">
                    Contacts are the starting point. Add a few and everything else connects from there.
                </p>
            </div>

            <div class="flex items-center justify-between gap-3 px-8 pb-7">
                <button type="button" class="crm-btn crm-btn-secondary" id="welcomeDismiss">
                    Look around first
                </button>
                <button type="button" class="crm-btn crm-btn-primary" id="welcomeAddContact">
                    <i class="fas fa-user-plus text-xs"></i>
                    Add first contact
                </button>
            </div>

        </div>
    </div>
</div>

<style>
@keyframes welcome-enter {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}
#welcomeCard { animation: welcome-enter 0.2s ease-out; }
@media (prefers-reduced-motion: reduce) { #welcomeCard { animation: none; } }
</style>

<script>
(function () {
    const overlay = document.getElementById('welcomeOverlay');
    const addContactUrl = {{ url_for('contacts.create_contact')|tojson }};

    document.body.style.overflow = 'hidden';

    function dismiss(then) {
        document.body.style.overflow = '';
        overlay.style.opacity = '0';
        overlay.style.transition = 'opacity 0.15s ease';
        setTimeout(function () {
            overlay.remove();
            if (then) then();
        }, 150);
        fetch('/dashboard/dismiss-onboarding', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        }).catch(function (err) { console.error(err); });
    }

    document.getElementById('welcomeDismiss').addEventListener('click', function () { dismiss(); });
    document.getElementById('welcomeBackdrop').addEventListener('click', function () { dismiss(); });
    document.getElementById('welcomeAddContact').addEventListener('click', function () {
        dismiss(function () { window.location.href = addContactUrl; });
    });
})();
</script>
