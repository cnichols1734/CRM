name: Integration Tests

on:
  pull_request:
    branches: [main]
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------
  # Job 1: Pytest integration tests (Flask test client, no browser)
  # -------------------------------------------------------------------
  pytest:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:////tmp/test_integration.db
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run pytest integration tests
        run: |
          pytest tests/ -x -v --ignore=tests/run_tests.py --ignore=tests/run_scheduled_tests.py --ignore=tests/test_idor_protection.py --ignore=tests/test_sendgrid.py --tb=short
          pytest tests/test_idor_protection.py -x -v --tb=short

  # -------------------------------------------------------------------
  # Job 2: Playwright browser tests (requires running app + secrets)
  # -------------------------------------------------------------------
  playwright:
    runs-on: ubuntu-latest

    env:
      TEST_USERNAME: browser-test@example.com
      TEST_PASSWORD: browser-test-password123
      DATABASE_URL: sqlite:////tmp/browser_integration.db
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Bootstrap isolated browser test database
        run: python tests/bootstrap_browser_test_db.py

      - name: Start Flask app
        run: |
          python app.py &
          sleep 5
          curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:5011/login

      - name: Run integration tests
        run: python tests/run_tests.py --base-url http://127.0.0.1:5011

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs
          path: |
            tests/*.png
            tests/*.log
