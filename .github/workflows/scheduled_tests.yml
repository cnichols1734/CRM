name: Scheduled Integration Tests

on:
  # Run every hour to catch issues in main
  schedule:
    - cron: '0 * * * *'  # Every hour at minute 0
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      TEST_USERNAME: browser-test@example.com
      TEST_PASSWORD: browser-test-password123
      DATABASE_URL: sqlite:////tmp/scheduled_browser_integration.db
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Bootstrap isolated browser test database
        run: python tests/bootstrap_browser_test_db.py

      - name: Start Flask app
        run: |
          python app.py &
          # Wait for server to start
          sleep 5
          # Verify server is running
          curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:5011/login

      - name: Run scheduled integration tests
        run: python tests/run_scheduled_tests.py --base-url http://127.0.0.1:5011

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-test-failure-logs
          path: |
            tests/*.png
            tests/*.log

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Scheduled tests failed on main branch! Check the logs for details."
          # You can add Slack/Discord/email notification here later
